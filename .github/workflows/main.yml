name: IPTV Token Auto-Update

on:
  schedule:
    - cron: '0 */3 * * *' # Hər 3 saatdan bir işləyir
  workflow_dispatch: # İstədiyiniz vaxt əllə başlatmaq üçün düymə

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        run: python update_iptv.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Github Action Bot"
          git config --global user.email "action@github.com"
          git add playlist.m3u
          git commit -m "Auto-update: New token applied $(date)" || echo "No changes to commit"
          git push
