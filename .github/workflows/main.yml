name: Update IPTV

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Qlobal mühit dəyişəni əlavə edirik ki, Node 24 istifadə olunsun
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Daha stabil versiya

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python update_link.py

      - name: Commit & push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add IPTV.m3u
          # Əgər dəyişiklik yoxdursa xəta verməməsi üçün '|| exit 0' istifadə edirik
          git commit -m "Auto update IPTV: $(date)" || exit 0
          git push
